<!doctype html>
<html>

<head>
  <meta charset="UTF-8">
  <link type="text/css" href="css/fontello.css" rel="stylesheet">
  <link type="text/css" href="css/style.css" rel="stylesheet" />
  <link type="text/css" href="css/history.css" rel="stylesheet" />
  <script type="module" src="js/history.js"></script>
  <title id="gsTitle" data-i18n="__MSG_ext_extension_name__ - __MSG_html_history_title__"></title>
</head>

<body>

  <div class="mainContent">

    <div class="pageHeader">
      <div class="brandMark">
        <div class="brandTitle">
          <img src="img/suspendy-guy-main.webp" alt="" class="extensionIcon" aria-hidden="true" />
          <h1 data-i18n="__MSG_ext_extension_name__"></h1>
        </div>
        <div class="brandCodeworks">
          <img src="img/marvellous-codeworks-logo.webp" alt="" class="brandLogo" aria-hidden="true" />
          <span class="brandSubtitle">a Marvellous Codeworks project</span>
        </div>
      </div>
    </div>

    <nav class="contentNav">
      <ul>
        <li>
          <a href="options.html" data-i18n="__MSG_html_sidebar_general_settings__"></a>
        </li>
        <li class="noIncognito">
          <a class="active" href="history.html" data-i18n="__MSG_html_sidebar_session_management__"></a>
        </li>
        <li>
          <a href="health.html" data-i18n="__MSG_html_sidebar_tab_health__"></a>
        </li>
        <li class="noIncognito">
          <a href="shortcuts.html" data-i18n="__MSG_html_sidebar_shortcuts__"></a>
        </li>
        <li>
          <a href="about.html" data-i18n="__MSG_html_sidebar_support__"></a>
        </li>
      </ul>
    </nav>

    <div class="content">
      <span id="debugWindowId"></span>

      <p class="pageTitle" data-i18n="__MSG_html_history_title__"></p>

      <div class="sub-section">
        <h2 data-i18n="__MSG_html_history_current_session__"></h2>
        <div id="currentSessions" class="sessionsContainer"></div>
      </div>

      <div class="sub-section">
        <h2 data-i18n="__MSG_html_history_recent_sessions__"></h2>
        <div id="recoverySessions" class="sessionsContainer"></div>
      </div>

      <div class="sub-section">
        <h2 data-i18n="__MSG_html_history_saved_sessions__"></h2>
        <div id="historySessions" class="sessionsContainer"></div>
        <a href="#" id="importSession" class="btn" data-i18n="__MSG_html_history_import_session__"></a>
        <input type="file" id="importSessionAction" hidden />
      </div>

      <div class="sub-section">
        <h2 data-i18n="__MSG_html_history_migrate_section_title__"></h2>
        <p class="gsNote" data-i18n="__MSG_html_history_migrate_section_desc__"></p>
        <div class="formRow">
          <span class="topLabel" data-i18n="__MSG_html_history_migrate_old_id__"></span>
          <div class="migrate-input-row">
            <input type="text" size="33" id="migrateFromId" value="klbibkeccnjlkjkiokjodocebajanakg" />
            <div id="migrateFromName" class="lesserText"></div>
          </div>
        </div>
        <div class="formRow">
          <a href="#" id="migrateTabs" class="btn" data-i18n="__MSG_html_history_migrate_tabs__"></a>
        </div>
        <div id="migrateMessage"></div>
      </div>

    </div>

  </div>

</body>

</html>
