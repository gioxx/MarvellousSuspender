<!doctype html>
<html>

<head>
  <meta charset="UTF-8">
  <link type="text/css" href="css/style.css" rel="stylesheet" />
  <script type="module" src="js/history.js"></script>
  <script type="module" src="js/gsNavBadge.js"></script>
  <title id="gsTitle" data-i18n="__MSG_ext_extension_name__ - __MSG_html_history_title__"></title>
</head>

<body>

  <div class="mainContent">

    <div class="pageHeader">
      <div class="brandMark">
        <div class="brandTitle">
          <img src="img/suspendy-guy-main.webp" alt="" class="extensionIcon" aria-hidden="true" />
          <div class="brandTitleText">
            <h1 data-i18n="__MSG_ext_extension_name__"></h1>
            <div class="brandLinks">
              <span id="headerVersion"></span>
              <span aria-hidden="true">·</span>
              <a href="https://marvellouscode.works/tms" target="_blank">marvellouscode.works/tms</a>
              <span aria-hidden="true">·</span>
              <a href="https://kb.marvellouscode.works" target="_blank">kb.marvellouscode.works</a>
            </div>
          </div>
        </div>
        <div class="brandCodeworks">
          <img src="img/marvellous-codeworks-logo.webp" alt="" class="brandLogo" aria-hidden="true" />
          <span class="brandSubtitle">a <a href="https://marvellouscode.works" target="_blank">Marvellous Codeworks</a> project</span>
        </div>
      </div>
    </div>

    <nav class="contentNav">
      <ul>
        <li>
          <a href="options.html" data-i18n="__MSG_html_sidebar_general_settings__"></a>
        </li>
        <li class="noIncognito">
          <a class="active" href="history.html" data-i18n="__MSG_html_sidebar_session_management__"></a>
        </li>
        <li class="noIncognito">
          <a href="backup.html" data-i18n="__MSG_html_sidebar_backup__"></a>
        </li>
        <li>
          <a href="health.html" data-i18n="__MSG_html_sidebar_tab_health__"></a>

        <li class="noIncognito">
          <a href="shortcuts.html" data-i18n="__MSG_html_sidebar_shortcuts__"></a>
        </li>
        <li>
          <a href="news.html"><span data-i18n="__MSG_html_sidebar_news__"></span>
            <span class="navBadge reallyHidden" id="navNewsBadge" aria-label="Unread news"></span>
          </a>
        </li>
        <li>
          <a href="about.html" data-i18n="__MSG_html_sidebar_support__"></a>
        </li>
      </ul>
    </nav>

    <div class="content">
      <span id="debugWindowId"></span>

      <p class="pageTitle" data-i18n="__MSG_html_history_title__"></p>
      <p class="sectionDesc" data-i18n="__MSG_html_history_page_desc__"></p>

      <nav class="pageInlineNav" aria-label="Jump to section">
        <a href="#section-current"  data-i18n="__MSG_html_history_current_session__"></a>
        <a href="#section-recent"   data-i18n="__MSG_html_history_recent_sessions__"></a>
        <a href="#section-saved"    data-i18n="__MSG_html_history_saved_sessions__"></a>
        <a href="#section-migrate"  data-i18n="__MSG_html_history_migrate_nav__"></a>
      </nav>

      <div class="gsNote gsNote--warn historyBackupHint noIncognito" role="note">
        <span><span data-i18n="__MSG_html_history_backup_hint_prefix__"></span> <a href="backup.html" data-i18n="__MSG_html_history_backup_settings_link__"></a></span>

        <div id="currentSessions" class="sessionsContainer"></div>

      <div class="sub-section" id="section-recent">
        <h2 data-i18n="__MSG_html_history_recent_sessions__"></h2>
        <div id="recoverySessions" class="sessionsContainer"></div>
      </div>

        <h2 data-i18n="__MSG_html_history_saved_sessions__"></h2>

        <input type="file" id="importSessionAction" hidden />

          <span class="topLabel" data-i18n="__MSG_html_history_migrate_old_id__"></span>
          <div class="migrate-input-row">
            <input type="text" size="33" id="migrateFromId" value="klbibkeccnjlkjkiokjodocebajanakg" />
            <div id="migrateFromName" class="lesserText"></div>
            <a href="#" id="migrateTabs" class="btn btnNeg" data-i18n="__MSG_html_history_migrate_tabs__"></a>

<button id="backToTop" aria-label="Back to top" data-i18n="__MSG_html_options_back_to_top__"></button>

</html>
