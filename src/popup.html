<!doctype html>
<html>

<head>
  <meta charset="UTF-8">
	<link type="text/css" href="css/popup.css" rel="stylesheet">
	<script type="module" src="js/popup.js"></script>

</head>

<body>
	<div id="brand">
		<img src="img/suspendy-guy-main.webp" alt="" aria-hidden="true" />
		<span data-i18n="__MSG_ext_extension_name__"></span>
		<span id="brandVersion"></span>
	</div>
	<div id="header">
		<span id="statusDetail"></span>
	</div>
	<div id="backupErrorBanner" class="hidden" role="alert">
		<span data-i18n="__MSG_html_popup_backup_drive_error__"></span>
	</div>
	<div id="popupContent">
		<div class="group" id="optsCurrent">
			<div class="menuOption" id="unsuspendOne">
				<span class="optionText" data-i18n="__MSG_html_popup_unsuspend_tab__"></span>
			</div>
			<div class="menuOption" id="suspendOne">
				<span class="optionText" data-i18n="__MSG_html_popup_suspend_tab__"></span>
			</div>
			<div class="menuOption" id="whitelistPage">
				<span class="optionText" data-i18n="__MSG_html_popup_never_suspend_page__"></span>
			</div>
			<div class="menuOption" id="whitelistDomain">
				<span class="optionText" data-i18n="__MSG_html_popup_never_suspend_domain__"></span>
			</div>
		</div>

		<div class="group" id="optsSelected">
			<div class="menuOption" id="suspendSelected">
				<span class="optionText" data-i18n="__MSG_html_popup_suspend_selected_tabs__"></span>
			</div>
			<div class="menuOption" href="#" id="unsuspendSelected">
				<span class="optionText" data-i18n="__MSG_html_popup_unsuspend_selected_tabs__"></span>
			</div>
		</div>

		<div class="group" id="optsAll">
			<div class="menuOption" id="suspendAll">
				<span class="optionText" data-i18n="__MSG_html_popup_suspend_other_tabs__"></span>
			</div>
			<div class="menuOption" href="#" id="unsuspendAll">
				<span class="optionText" data-i18n="__MSG_html_popup_unsuspend_all_tabs__"></span>
			</div>
			<div class="menuOption" id="unsuspendWhitelisted">
				<span class="optionText" data-i18n="__MSG_html_popup_unsuspend_whitelisted_tabs__"></span>
			</div>
		</div>

		<div class="group hidden" id="optsBackup">
			<div class="menuOption" id="backupNow">
				<span class="optionText" id="backupNowLabel"></span>
			</div>
		</div>

		<div class="group">
			<div class="menuOption" id="sessionManagerLink">
				<span class="optionText" data-i18n="__MSG_html_sidebar_session_management__"></span>
			</div>
			<div class="menuOption" id="settingsLink">
				<span class="optionText" data-i18n="__MSG_html_popup_settings__"></span>
			</div>
		</div>
	</div>
</body>

</html>
