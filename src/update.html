<!doctype html>
<html>

<head>
  <meta charset="UTF-8">
  <link type="text/css" href="css/style.css" rel="stylesheet">
  <script type="module" src="js/update.js"></script>
  <title id="gsTitle" data-i18n="__MSG_ext_extension_name__ - __MSG_html_update_title__"></title>
</head>

<body class="splash-wrap">

  <div class="splash">

    <div class="splash-header brandMark">
      <div class="brandTitle">
        <img src="img/suspendy-guy-main.webp" alt="" class="extensionIcon" aria-hidden="true" />
        <h1 data-i18n="__MSG_ext_extension_name__"></h1>
      </div>
      <div class="brandCodeworks">
        <img src="img/marvellous-codeworks-logo.webp" alt="" class="brandLogo" aria-hidden="true" />
        <span class="brandSubtitle">a Marvellous Codeworks project</span>
      </div>
    </div>

    <img class="suspendy-guy" src="img/suspendy-guy.webp" alt="" />

    <div>
      <h1>
        <span data-i18n="__MSG_ext_extension_name__"></span>
        <span data-i18n="__MSG_html_update_heading2__"></span>
      </h1>
      <p data-i18n="__MSG_html_update_info__"></p>
      <div id="backupInfo">
        <p data-i18n="__MSG_html_update_info_withbackup__"></p>
      </div>
      <div id="noBackupInfo" class="reallyHidden">
        <p>
          <span data-i18n="__MSG_html_update_info_nobackup_prefix__"></span>
          <a id="sessionManagerLink" href="#" data-i18n="__MSG_html_session_manager__"></a>
          <span data-i18n="__MSG_html_update_info_nobackup_suffix__"></span>
        </p>
      </div>
      <hr />
      <div>
        <a href="#" id="exportBackupBtn" class="btn" data-i18n="__MSG_js_update_button_export__"></a>
        <a href="#" id="restartExtensionBtn" class="btn hidden" data-i18n="__MSG_js_update_button_reload__"></a>
      </div>
    </div>

  </div>

</body>

</html>
